services:
  postgres:
    image: postgres:17-alpine
    container_name: fpp-postgres
    environment:
      POSTGRES_DB: football_performance_platform
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: change-me-in-local-env
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d football_performance_platform"]
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:RELEASE.2025-09-07T16-13-09Z
    container_name: fpp-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio-dev-access-key
      MINIO_ROOT_PASSWORD: minio-dev-secret-key
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.27
    container_name: fpp-mailpit
    ports:
      - "1025:1025"
      - "8025:8025"

volumes:
  postgres-data:
  minio-data:
